---
- name: Deploy Flask app on webservers
  hosts: webservers
  become: yes

  vars:
    app_dir: "/opt/NSO_A2"
    flask_port: 7000

  tasks:
    - name: Install required packages
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - ufw
        state: present
        update_cache: yes

    - name: Allow SSH through firewall
      ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Flask backend port
      ufw:
        rule: allow
        port: "{{ flask_port }}"
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy application2.py
      copy:
        src: application2.py
        dest: "{{ app_dir }}/application2.py"
        mode: "0755"

    - name: Create virtual environment
      command: python3 -m venv {{ app_dir }}/venv
      args:
        creates: "{{ app_dir }}/venv/bin/activate"

    - name: Install Flask
      command: "{{ app_dir }}/venv/bin/pip install flask"

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/flask_app.service
        mode: "0644"
        content: |
          [Unit]
          Description=NSO Flask App
          After=network.target

          [Service]
          WorkingDirectory={{ app_dir }}
          ExecStart={{ app_dir }}/venv/bin/python -c "import application2; application2.app.run(host='0.0.0.0', port=7000)"

          [Install]
          WantedBy=multi-user.target
      notify: restart flask

    - name: Enable and restart Flask
      systemd:
        name: flask_app
        enabled: yes
        state: restarted
        daemon_reload: yes

    - name: Wait for Flask app
      wait_for:
        host: 127.0.0.1
        port: "{{ flask_port }}"
        timeout: 30

  handlers:
    - name: restart flask
      systemd:
        name: flask_app
        state: restarted
        daemon_reload: yes


- name: Configure HAProxy
  hosts: HAproxy
  become: yes

  tasks:
    - name: Install HAProxy and UFW
      apt:
        name:
          - haproxy
          - ufw
        state: present
        update_cache: yes

    - name: Allow SSH through firewall
      ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow HTTP port 80
      ufw:
        rule: allow
        port: 80
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Configure HAProxy
      template:
        src: templates/haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"
      notify: restart haproxy

    - name: Restart HAProxy immediately
      systemd:
        name: haproxy
        state: restarted
        enabled: yes

  handlers:
    - name: restart haproxy
      systemd:
        name: haproxy
        state: restarted
